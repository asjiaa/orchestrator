name: orchestrator

services:
  cache:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-buckets:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/orchestrator;
      exit 0;
      "
    restart: on-failure
  
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "orchestrator" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://cache:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: orchestrator
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      DATABASE_URL: postgres://orchestrator:orchestrator@db:5432/orchestrator
    depends_on:
      cache:
        condition: service_healthy
      minio-buckets:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: ./infra/worker/Dockerfile
    ports:
      - "6060"
    environment:
      REDIS_URL: redis://cache:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: orchestrator
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      DATABASE_URL: postgres://orchestrator:orchestrator@db:5432/orchestrator
      WORKER_CONCURRENCY: "4"
      VIPS_WORKERS: "1"
      
    depends_on:
      cache:
        condition: service_healthy
      minio-buckets:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  data-minio:
  postgres-data: